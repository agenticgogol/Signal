name: Daily Feed Pipeline
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: How many days of feed entries to consider
        required: false
        default: '7'
        type: choice
        options: ['1', '3', '7', '14']
      max_per_source:
        description: Maximum feed entries to process per source
        required: false
        default: '5'
        type: choice
        options: ['1', '3', '5', '10']
jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: genai-analyst-os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python -m src.run_pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MOCK_LLM: false
          CRAWL_LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
          CRAWL_MAX_PER_SOURCE: ${{ inputs.max_per_source || '5' }}
