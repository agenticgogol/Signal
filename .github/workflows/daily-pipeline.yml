name: Daily Feed Pipeline
on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'How many days back to fetch articles'
        required: false
        default: '7'
      max_per_source:
        description: 'Max articles to pull per source'
        required: false
        default: '5'
jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: genai-analyst-os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python -m src.graph
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MOCK_LLM: false
          CRAWL_LOOKBACK_DAYS: ${{ inputs.lookback_days }}
          CRAWL_MAX_PER_SOURCE: ${{ inputs.max_per_source }}
